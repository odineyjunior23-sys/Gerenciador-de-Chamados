<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Chamados</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b1120; color: #e2e8f0; min-height: 100vh; }
    h1 { text-align: center; font-size: clamp(1.5rem, 3.5vw, 2.8rem); margin-bottom: 1.5rem; padding: 0 1rem; color: #38bdf8; }
    .main-container { max-width: 1100px; margin: 0 auto; padding: 0 1rem; display: flex; gap: 1.5rem; align-items: flex-start; }
    .left-panel { flex: 1; min-width: 0; }
    .right-panel { width: 340px; flex-shrink: 0; }
    .topbar { background: #1e293b; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .datetime .time { font-size: 1.75rem; font-weight: 700; color: #38bdf8; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
    .datetime .date { font-size: 0.85rem; color: #64748b; margin-top: 2px; }
    .weather { display: flex; align-items: center; gap: 0.6rem; }
    .weather-icon { font-size: 2rem; }
    .weather .temp { font-size: 1.2rem; font-weight: 700; color: #e2e8f0; }
    .weather .desc { font-size: 0.75rem; color: #64748b; }
    .weather .location { display: none; }
    .calendar-card { background: #1e293b; border-radius: 12px; padding: 1rem; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .calendar-header .month-year { font-size: 0.95rem; font-weight: 600; }
    .cal-nav { display: flex; gap: 0.2rem; }
    .cal-nav button { background: transparent; border: none; color: #64748b; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .cal-nav button:hover { color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
    .calendar-selects { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; justify-content: center; align-items: center; }
    .calendar-selects select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 0.3rem 0.5rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .calendar-selects select:focus { border-color: #38bdf8; outline: none; }
    .calendar-selects .go-today { background: transparent; border: 1px solid #334155; color: #38bdf8; padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
    .calendar-selects .go-today:hover { background: #38bdf8; color: #0f172a; }
    .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.65rem; color: #38bdf8; font-weight: 600; margin-bottom: 0.3rem; }
    .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .region-map-card { background: #1e293b; border-radius: 12px; padding: 1rem; margin-bottom: 1.25rem; }
    .legend-regions { display: flex; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; font-size: 0.75rem; }
    .legend-item { display: flex; align-items: center; gap: 0.3rem; color: #94a3b8; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    #maracajuMap { width: 100%; height: 280px; border-radius: 8px; background: #0f172a; }
    #region-detected { min-height: 1.2rem; font-weight: 500; text-align: center; margin-top: 0.5rem; }
    .calendar-days .day { position: relative; padding: 0.3rem 0; font-size: 0.8rem; border-radius: 6px; cursor: pointer; color: #94a3b8; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .calendar-days .day:hover { background: #334155; }
    .calendar-days .day.selected { background: #8b5cf6; color: #0f172a; font-weight: 600; }
    .calendar-days .day.today { background: #38bdf8; color: #0f172a; font-weight: 700; }
    .calendar-days .day.today.selected { background: linear-gradient(135deg, #38bdf8, #8b5cf6); color: #0f172a; font-weight: 700; }
    .calendar-days .day.other-month { color: #1e293b; cursor: default; }
    .calendar-days .day.other-month:hover { background: transparent; }
    .calendar-days .day.has-chamado { border: 1px solid #8b5cf6; }
    .calendar-days .day.holiday .day-dot { position: absolute; top: 2px; right: 3px; width: 5px; height: 5px; border-radius: 50%; background: #f59e0b; }
    .calendar-days .day.weekend { color: #818cf8; }
    .calendar-days .day.has-chamados-count .chamado-count { display: inline-block; font-size: 0.5rem; margin-top: 1px; color: #38bdf8; font-weight: bold; }
    .holiday-panel { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #334155; min-height: 28px; }
    .holiday-panel .holiday-title { font-size: 0.8rem; font-weight: 600; color: #f59e0b; margin-bottom: 0.3rem; }
    .holiday-panel .holiday-list { list-style: none; display: flex; flex-direction: column; gap: 0.25rem; }
    .holiday-panel .holiday-list li { font-size: 0.7rem; color: #94a3b8; padding: 0.2rem 0.5rem; background: #0f172a; border-radius: 4px; display: flex; align-items: center; gap: 0.35rem; }
    .form-card { background: #1e293b; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .form-card form { display: flex; flex-direction: column; gap: 0.75rem; }
    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .form-group { flex: 0 1 220px; min-width: 120px; display: flex; flex-direction: column; gap: 0.25rem; }
    .form-group.wide { flex: 1; }
    .form-group label { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-card input[type="text"], .form-card input[type="number"], .form-card textarea,
    .modal input[type="text"], .modal input[type="number"], .modal textarea { width: 100%; padding: 0.55rem 0.75rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; }
    .form-card input[type="number"] { -moz-appearance: textfield; }
    .form-card input[type="number"]::-webkit-inner-spin-button, .form-card input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .form-card textarea { resize: vertical; min-height: 44px; }
    .form-card input:focus, .form-card textarea:focus, .modal input:focus, .modal textarea:focus { outline: none; border-color: #38bdf8; }
    .form-card .form-actions { display: flex; justify-content: flex-end; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); animation: fadeIn 0.15s; }
    .modal-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal { background: #1e293b; border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 420px; animation: slideUp 0.2s ease-out; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .modal h3 { font-size: 1.1rem; margin-bottom: 1rem; color: #38bdf8; }
    .modal form { display: flex; flex-direction: column; gap: 0.75rem; }
    .modal .form-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
    .modal textarea { min-height: 60px; }
    .btn-cancel { background: transparent; color: #64748b; border: 1px solid #334155; }
    .btn-cancel:hover { background: #334155; color: #e2e8f0; }
    .btn { padding: 0.55rem 1.2rem; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-danger { background: transparent; color: #ef4444; padding: 0.3rem 0.6rem; font-size: 0.75rem; border: 1px solid #ef444440; }
    .btn-danger:hover { background: #ef4444; color: white; }
    .btn-toggle { background: transparent; color: #94a3b8; padding: 0.3rem 0.6rem; font-size: 0.75rem; border: 1px solid #334155; }
    .btn-toggle:hover { background: #22c55e; color: #0f172a; border-color: #22c55e; }
    .btn-toggle.done { background: #22c55e20; color: #22c55e; border-color: #22c55e40; }
    .btn-toggle.done:hover { background: #22c55e; color: #0f172a; }
    .btn-edit { background: transparent; color: #8b5cf6; padding: 0.3rem 0.6rem; font-size: 0.75rem; border: 1px solid #8b5cf640; }
    .btn-edit:hover { background: #8b5cf6; color: white; }
    .btn-export-word { background: #2b579a; color: white; padding: 0.4rem 0.9rem; font-size: 0.8rem; border-radius: 8px; }
    .btn-export-word:hover { background: #3a6fb5; }
    .btn-export-excel { background: #217346; color: white; padding: 0.4rem 0.9rem; font-size: 0.8rem; border-radius: 8px; }
    .btn-export-excel:hover { background: #2a9459; }
    .export-bar { display: flex; gap: 0.4rem; margin-bottom: 1rem; justify-content: flex-end; }
    .filters { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; align-items: center; flex-wrap: wrap; }
    .filter-btn { padding: 0.35rem 0.8rem; border-radius: 20px; border: 1px solid #334155; background: transparent; color: #64748b; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
    .filter-btn:hover:not(.active) { border-color: #38bdf8; color: #38bdf8; }
    .search-container { flex: 1; min-width: 200px; max-width: 350px; position: relative; }
    .search-box { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 0.35rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-family: inherit; outline: none; transition: border-color 0.15s; width: 100%; }
    .search-box:focus { border-color: #38bdf8; }
    .search-box::placeholder { color: #475569; }
    .search-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 8px; margin-top: 4px; max-height: 280px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .search-suggestions.show { display: block; }
    .suggestion-item { padding: 0.6rem 0.8rem; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.15s; display: flex; flex-direction: column; gap: 0.2rem; }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: #263348; }
    .suggestion-item.selected { background: #334155; }
    .suggestion-number { font-size: 0.75rem; font-weight: 700; color: #38bdf8; }
    .suggestion-local { font-size: 0.7rem; color: #94a3b8; }
    .suggestion-problem { font-size: 0.8rem; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suggestion-urgency { font-size: 0.6rem; padding: 0.1rem 0.35rem; border-radius: 10px; width: fit-content; }
    .suggestion-meta { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.2rem; }
    .list-empty { text-align: center; padding: 3rem 1rem; color: #475569; }
    .chamado-item { background: #1e293b; border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; transition: background 0.15s; }
    .chamado-item:hover { background: #263348; }
    .chamado-item.concluido { border-left: 3px solid #22c55e; }
    .chamado-item.a-fazer { border-left: 3px solid #f59e0b; }
    .chamado-item.pendente { border-left: 3px solid #38bdf8; }
    .chamado-info { flex: 1; min-width: 0; }
    .chamado-title { font-size: 0.9rem; margin-bottom: 0.15rem; word-break: break-word; color: #e2e8f0; }
    .chamado-title.concluido { text-decoration: line-through; color: #64748b; }
    .chamado-date { font-size: 0.7rem; color: #94a3b8; }
    .chamado-status { font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 10px; font-weight: 600; white-space: nowrap; }
    .chamado-status.concluido { background: #16653440; color: #4ade80; }
    .chamado-status.a-fazer { background: #713f1240; color: #fbbf24; }
    .chamado-status.pendente { background: #0e3a5240; color: #38bdf8; }
    .urgency-badge { font-size: 0.6rem; padding: 0.1rem 0.45rem; border-radius: 10px; font-weight: 700; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px; }
    .urgency-muito-alta { background: #ef444430; color: #ef4444; border: 1px solid #ef444460; }
    .urgency-alta { background: #f9731630; color: #f97316; border: 1px solid #f9731660; }
    .urgency-media { background: #ffffffcc; color: #000000; border: 1px solid #00000040; }
    .urgency-baixa { background: #3b82f630; color: #3b82f6; border: 1px solid #3b82f660; }
    .urgency-muito-baixa { background: #22c55e30; color: #22c55e; border: 1px solid #22c55e60; }
    .urgency-select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 0.4rem 0.6rem; border-radius: 8px; font-size: 0.85rem; font-family: inherit; cursor: pointer; transition: all 0.2s; width: 100%; }
    .urgency-select:focus { border-color: #38bdf8; outline: none; background: #1e293b; box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
    .calendar-chamado-item { font-size: 0.7rem; color: #94a3b8; padding: 0.25rem 0.5rem; background: #0f172a; border-radius: 4px; display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.3rem; }
    .chamado-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .count-bar { display: flex; gap: 1rem; font-size: 0.8rem; color: #475569; margin-bottom: 0.75rem; }
    .count-bar span strong { color: #94a3b8; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56,189,248,0.4); } 70% { box-shadow: 0 0 0 10px rgba(56,189,248,0); } 100% { box-shadow: 0 0 0 0 rgba(56,189,248,0); } }
    .chamado-item.highlight { animation: pulse 0.8s ease-out; border-left-color: #38bdf8 !important; }
    .local-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 8px; margin-top: 3px; max-height: 220px; overflow-y: auto; z-index: 200; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .local-suggestions.show { display: block; }
    .local-sugg-item { padding: 0.5rem 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid #1e293b; transition: background 0.1s; }
    .local-sugg-item:hover, .local-sugg-item.selected { background: #263348; }
    .local-sugg-item:last-child { border-bottom: none; }
    .local-sugg-icon { font-size: 0.9rem; flex-shrink: 0; }
    .local-sugg-nome { font-size: 0.8rem; color: #e2e8f0; flex: 1; }
    .local-sugg-regiao { font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
    .local-sugg-tipo { font-size: 0.6rem; color: #64748b; }
    .region-preview { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.35rem; min-height: 1.4rem; font-size: 0.78rem; transition: all 0.2s; }
    .region-preview-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .region-preview-text { font-weight: 600; }
    .chamado-local-link { cursor: pointer; text-decoration: underline dotted; color: inherit; }
    .chamado-local-link:hover { opacity: 0.8; }
    .chamado-regiao-badge { display: inline-flex; align-items: center; gap: 3px; padding: 1px 7px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; border: 1px solid; cursor: pointer; margin-left: 4px; transition: opacity 0.15s; }
    .chamado-regiao-badge:hover { opacity: 0.75; }
    /* ── Inline edit panel ── */
    .inline-edit-panel { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 0.75rem 1rem; margin: -2px 0 6px 0; animation: slideUp 0.15s ease-out; }
    .inline-edit-panel .ie-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 0.5rem; }
    .inline-edit-panel .ie-group { display: flex; flex-direction: column; gap: 0.2rem; }
    .inline-edit-panel label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; }
    .inline-edit-panel input, .inline-edit-panel select, .inline-edit-panel textarea { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; font-size: 0.8rem; font-family: inherit; padding: 0.35rem 0.55rem; outline: none; transition: border-color 0.15s; }
    .inline-edit-panel input:focus, .inline-edit-panel select:focus, .inline-edit-panel textarea:focus { border-color: #38bdf8; }
    .inline-edit-panel textarea { resize: vertical; min-height: 52px; width: 100%; }
    .inline-edit-panel .ie-num { width: 90px; }
    .inline-edit-panel .ie-local { flex: 1; min-width: 160px; }
    .inline-edit-panel .ie-actions { display: flex; gap: 0.4rem; justify-content: flex-end; margin-top: 0.1rem; }
  </style>
</head>
<body>
  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal" onclick="closeEditModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Editar Chamado</h3>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group">
            <label for="editNumero">Número do Chamado</label>
            <input type="number" id="editNumero" required>
          </div>
          <div class="form-group">
            <label for="editLocal">Local</label>
            <input type="text" id="editLocal" required>
          </div>
          <div class="form-group">
            <label for="editUrgencia">Urgência</label>
            <select id="editUrgencia" class="urgency-select" required>
              <option value="muito-alta">🔴 Muito Alta</option>
              <option value="alta">🟠 Alta</option>
              <option value="media">🟡 Média</option>
              <option value="baixa">🔵 Baixa</option>
              <option value="muito-baixa">🟢 Muito Baixa</option>
            </select>
          </div>
        </div>
        <div class="form-group wide">
          <label for="editProblema">Problema</label>
          <textarea id="editProblema" required></textarea>
        </div>
        <div class="form-group">
          <label for="editStatus">Status</label>
          <select id="editStatus" class="urgency-select" required>
            <option value="a-fazer">A Fazer</option>
            <option value="pendente">Pendente</option>
            <option value="concluido">Concluído</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" onclick="closeEditModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <h1>Gerenciador de Chamados</h1>
  <div class="main-container">
    <div class="left-panel">
      <!-- Regional Map Section -->
      <div class="region-map-card">
        <h3 style="margin-bottom:0.75rem;color:#38bdf8;font-size:1rem;display:flex;justify-content:space-between;align-items:center;">
          Maracaju – Mapa Completo
          <span style="font-size:0.7rem;color:#64748b;font-weight:normal">Clique nos marcadores</span>
        </h3>
        <div class="legend-regions" style="flex-wrap:wrap;gap:0.5rem 1rem;">
          <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Norte</div>
          <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Sul</div>
          <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> Leste</div>
          <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> Oeste</div>
          <div class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span> Centro</div>
          <div class="legend-item" style="border-left:1px solid #334155;padding-left:0.75rem;margin-left:0.25rem;">
            <span style="font-size:0.8rem;">🏛️</span> <span style="color:#94a3b8">Secretarias</span>
          </div>
          <div class="legend-item"><span style="font-size:0.8rem;">🏫</span> <span style="color:#94a3b8">Escolas</span></div>
          <div class="legend-item"><span style="font-size:0.8rem;">🎒</span> <span style="color:#94a3b8">CIEIs</span></div>
          <div class="legend-item"><span style="font-size:0.8rem;">🏥</span> <span style="color:#94a3b8">Postos de Saúde</span></div>
        </div>
        <div id="maracajuMap" style="width:100%;min-height:260px;height:260px;border-radius:8px;position:relative;"></div>
        <p id="region-detected" style="margin-top:0.5rem;font-size:0.85rem;color:#64748b;text-align:center;min-height:1.2em;"></p>
      </div>

      <!-- Top bar: clock + weather -->
      <div class="topbar">
        <div class="datetime">
          <div class="time" id="clock">--:--:--</div>
          <div class="date" id="dateDisplay"></div>
        </div>
        <div class="weather" id="weatherWidget">
          <div class="weather-icon" id="weatherIcon"></div>
          <div>
            <div class="temp" id="weatherTemp">-- °C</div>
            <div class="desc" id="weatherDesc">Carregando clima...</div>
            <div class="location" id="weatherLocation"></div>

    function nthDayOfMonth(month, dayOfWeek, occurrence, year) {
      const d = new Date(year, month, 1); let count = 0;
      while (d.getMonth() === month) {

            i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
            month=Math.floor((h+l-7*m+114)/31)-1,day=((h+l-7*m+114)%31)+1;
      return new Date(year,month,day);
    }

    function getMovableHolidays(year) {
      const easter = getEaster(year); const movable = [];
      const addFromEaster = (days, name) => { const d=new Date(easter); d.setDate(d.getDate()+days); movable.push([d.getMonth(),d.getDate(),name]); };
      const addNth = (month,dow,n,name) => { const d=nthDayOfMonth(month,dow,n,year); movable.push([d.getMonth(),d.getDate(),name]); };
      addFromEaster(-47,'Carnaval'); addFromEaster(-46,'Carnaval (Terça)');
      addFromEaster(-45,'Quarta-feira de Cinzas'); addFromEaster(-2,'Sexta-feira Santa');
      addFromEaster(0,'Páscoa'); addFromEaster(60,'Corpus Christi');
      addNth(4,0,2,'Dia das Mães'); addNth(7,0,2,'Dia dos Pais');
      return movable;
    }

    function getHolidaysForDate(month, day) {
      const results = [];
      FIXED_HOLIDAYS.forEach(([m,d,name]) => { if(m===month&&d===day) results.push(name); });
      getMovableHolidays(calYear).forEach(([m,d,name]) => { if(m===month&&d===day) results.push(name); });
      return results;
    }

    function isHoliday(year, month, day) {
      for (const [m,d] of FIXED_HOLIDAYS) { if(m===month&&d===day) return true; }
      for (const [m,d] of getMovableHolidays(year)) { if(m===month&&d===day) return true; }
      return false;
    }

    function renderCalendar() {
      const daysEl = document.getElementById('calDays');
      document.getElementById('calMonthYear').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
      document.getElementById('calYearSelect').value = calYear;
      document.getElementById('calMonthSelect').value = calMonth;
      const first = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
      const today = new Date();
      const chamadoDays = getChamadoDatesByDay();
      let html = '';
      const prevMonthDays = new Date(calYear, calMonth, 0).getDate();
      for (let i=first-1; i>=0; i--) html += `<div class="day other-month">${prevMonthDays-i}</div>`;
      for (let d=1; d<=daysInMonth; d++) {
        const isToday = d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
        const key = `${calYear}-${calMonth}-${d}`;
        const hasChamado = chamadoDays[key] ? 'has-chamado' : '';
        const holiday = isHoliday(calYear, calMonth, d);
        const date = new Date(calYear, calMonth, d);
        const isWeekend = date.getDay()===0||date.getDay()===6;
        const isSelected = d===selectedDay ? 'selected' : '';
        const dayChamadosCount = getChamadosSync().filter(c => { const cd=new Date(c.modifiedAt); return cd.getFullYear()===calYear&&cd.getMonth()===calMonth&&cd.getDate()===d; }).length;
        let extraClass = '';
        let titleAttr = '';
        if (holiday) { const hn=getHolidaysForDate(calMonth,d); titleAttr=`title="${hn.join(', ')}"`; extraClass+=' holiday'; }
        if (isWeekend && !isToday) extraClass += ' weekend';
        if (hasChamado) extraClass += ' has-chamado';
        if (dayChamadosCount > 0) extraClass += ' has-chamados-count';
        let dayContent = d;
        if (holiday) dayContent += '<span class="day-dot"></span>';
        if (dayChamadosCount > 0) dayContent += `<span class="chamado-count">●</span>`;
        html += `<div class="day${isToday?' today':''}${extraClass}${isSelected?' selected':''}" ${titleAttr} onclick="showHolidays(${calMonth},${d})">${dayContent}</div>`;
      }
      const totalCells = first + daysInMonth;
      const remaining = (7-(totalCells%7))%7;
      for (let i=1; i<=remaining; i++) html += `<div class="day other-month">${i}</div>`;
      daysEl.innerHTML = html;
    }

    // ✅ Exporta os chamados filtrados em CSV (formato mais compatível com Excel)
    function exportTodosExcel() {
      const todosChamados = getChamadosSync();
      const chamados = todosChamados.filter(c => currentFilter === 'todos' || c.status === currentFilter);
      
      if (chamados.length === 0) return alert('Nenhum chamado encontrado nesta aba para exportar.');

      // Cabeçalhos do CSV
      const headers = ['#', 'Número', 'Local', 'Problema', 'Região', 'Urgência', 'Status', 'Data Modificação'];
      
      // Função para tratar campos que contenham vírgulas ou aspas
      const escapeCSV = (str) => {
        const text = String(str).replace(/"/g, '""'); // Escapa aspas duplas
        return `"${text}"`; // Envolve o campo em aspas duplas
      };

      // Gera as linhas do CSV
      const rows = chamados.map((c, i) => [
        i + 1,
        escapeCSV(c.numero),
        escapeCSV(c.local),
        escapeCSV(c.problem),
        escapeCSV(c.regiao || 'N/A'),
        escapeCSV(URGENCY_LABELS[c.urgency] || 'Média'),
        escapeCSV(getStatusLabel(c.status)),
        escapeCSV(formatDate(c.modifiedAt))
      ].join(';')); // Usa ponto e vírgula como separador (padrão Excel em PT-BR)

      // Concatena cabeçalho e linhas
      const csvContent = [headers.join(';'), ...rows].join('\n');

      const filename = `chamados_${currentFilter}_${new Date().toISOString().slice(0,10)}.csv`;
      
      // Usa o BOM (Byte Order Mark) para garantir que o Excel reconheça como UTF-8
      const BOM = '\uFEFF';
      const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function detectRegionFromLocal(local) {
      if (!local) return 'Centro';
      const l = local.toLowerCase().trim();

      // 1) Lookup direto por nome de estabelecimento
      for (const [key, region] of Object.entries(LOCAL_LOOKUP)) {
        if (l.includes(key)) return REGION_NORMALIZE[region] || region;
      }

      // 2) Busca por bairros conhecidos
      for (const [region, bairros] of Object.entries(REGION_BAIRROS)) {
        for (const bairro of bairros) {
          if (l.includes(bairro.toLowerCase())) return REGION_NORMALIZE[region] || region;
        }
      }

      // 3) Fallback por palavras-chave de direção
      if (l.includes('norte')) return 'Norte';
      if (l.includes('sul'))   return 'Sul';
      if (l.includes('leste')) return 'Leste';
      if (l.includes('oeste')) return 'Oeste';
      if (l.includes('centro') || l.includes('central')) return 'Centro';
      if (l.includes('rural') || l.includes('distrito') || l.includes('assentamento')) return 'Leste';

      return 'Centro';
    }

    (function initLocalAutocomplete() {
      const input  = document.getElementById('chamadoLocal');
      const box    = document.getElementById('localSuggestions');
      const prevEl = document.getElementById('regionPreview');
      const dotEl  = document.getElementById('regionPreviewDot');
      const txtEl  = document.getElementById('regionPreviewText');
      let activeIdx = -1;

      function showPreview(regiao) {
        if (!regiao) { prevEl.style.display = 'none'; return; }
        const cor = REGION_COLORS[regiao] || '#94a3b8';
        dotEl.style.background = cor;
        txtEl.textContent = `Região detectada: ${regiao}`;
        txtEl.style.color = cor;
        prevEl.style.display = 'flex';
      }

      function renderSuggestions(q) {
        if (!q || q.length < 2) { box.classList.remove('show'); return; }
        const matches = LOCAL_CATALOG.filter(l =>
          l.nome.toLowerCase().includes(q.toLowerCase()) ||
          l.tipo.toLowerCase().includes(q.toLowerCase()) ||
          l.regiao.toLowerCase().includes(q.toLowerCase())
        ).slice(0, 8);

        if (!matches.length) { box.classList.remove('show'); return; }
        activeIdx = -1;
        box.innerHTML = matches.map((m, i) => {
          const cor = REGION_COLORS[m.regiao] || '#94a3b8';
          return `<div class="local-sugg-item" data-idx="${i}" data-nome="${m.nome}" data-regiao="${m.regiao}">
            <span class="local-sugg-icon">${m.icon}</span>
            <div style="flex:1;min-width:0;">
              <div class="local-sugg-nome">${m.nome}</div>
              <div class="local-sugg-tipo">${m.tipo}</div>
            </div>
            <span class="local-sugg-regiao" style="background:${cor}20;color:${cor};border:1px solid ${cor}44;">${m.regiao}</span>
          </div>`;
        }).join('');
        box.classList.add('show');
      }

      function pickItem(nome, regiao) {
        input.value = nome;
        box.classList.remove('show');
        showPreview(regiao);
        // Destaca região no mapa se disponível
        if (typeof selectRegion === 'function') selectRegion(regiao);
      }

      input.addEventListener('input', () => {
        const q = input.value.trim();
        renderSuggestions(q);
        // Preview em tempo real mesmo sem selecionar da lista
        const auto = detectRegionFromLocal(q);
        showPreview(q.length >= 2 ? auto : null);
      });

      input.addEventListener('keydown', e => {
        const items = box.querySelectorAll('.local-sugg-item');
        if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); items.forEach((el,i) => el.classList.toggle('selected', i===activeIdx)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); items.forEach((el,i) => el.classList.toggle('selected', i===activeIdx)); }
        else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); const el = items[activeIdx]; if (el) pickItem(el.dataset.nome, el.dataset.regiao); }
        else if (e.key === 'Escape') box.classList.remove('show');
      });

      box.addEventListener('mousedown', e => {
        const item = e.target.closest('.local-sugg-item');
        if (item) { e.preventDefault(); pickItem(item.dataset.nome, item.dataset.regiao); }
      });

      document.addEventListener('click', e => {
        if (!input.contains(e.target) && !box.contains(e.target)) box.classList.remove('show');
      });
    })();

    // Destaca a região no mapa e mostra mensagem

      const mapSection = document.querySelector('.region-map-card');
      if (mapSection) mapSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (typeof selectRegion === 'function') selectRegion(regiao || detectRegionFromLocal(local));
      const rd = document.getElementById('region-detected');
      if (rd) {
        const cor = REGION_COLORS[regiao] || '#94a3b8';
        rd.style.color = cor;
        rd.innerHTML = `📍 <strong>${local}</strong> → Região <strong>${regiao}</strong>`;
      }
    };

    window.selectRegion = function(region) {
      const rd = document.getElementById('region-detected');
      if (rd) { rd.textContent = `Região selecionada: ${region}`; rd.style.color = REGION_COLORS[region]; }
      Object.entries(regionLayers).forEach(([name, layer]) => {
        layer.setStyle(name === region ? { fillOpacity: 0.7, weight: 4 } : { fillOpacity: 0.3, weight: 1 });
      });
      if (map && regionLayers[region]) map.fitBounds(regionLayers[region].getBounds(), { padding: [20,20] });
    };

    // ============ RENDER CHAMADOS ============
    function updateCounts(chamados) {
      document.getElementById('totalCount').textContent = chamados.length;
      document.getElementById('todoCount').textContent = chamados.filter(c => c.status === 'a-fazer').length;

    function renderChamadoItem(c, urgencyLabels) {
      const statusLabel = c.status === 'concluido' ? 'Concluído' : c.status === 'pendente' ? 'Pendente' : 'A Fazer';
      const isConcluido = c.status === 'concluido';
      const toggleLabel = isConcluido ? '↩ Reabrir' : '✓ Concluir';
      const regiao = c.regiao || detectRegionFromLocal(c.local) || 'Centro';
      const regCor = REGION_COLORS[regiao] || '#94a3b8';

      const localLower = (c.local || '').toLowerCase();
      let localIcon = '📍';
      if (localLower.includes('escola') || localLower.includes('e.m.')) localIcon = '🏫';
      else if (localLower.includes('ciei')) localIcon = '🎒';
      else if (localLower.includes('esf') || localLower.includes('ubs') || localLower.includes('posto') || localLower.includes('saúde')) localIcon = '🏥';
      else if (localLower.includes('prefeitura') || localLower.includes('secretaria') || localLower.includes('creas')) localIcon = '🏛️';

      return `
        <div class="chamado-item ${c.status}" id="chamado-${c.id}">
          <div class="chamado-info">
            <div class="chamado-title ${isConcluido ? 'concluido' : ''}">${escapeHtml(c.problem)}</div>
            <div class="chamado-date" style="display:flex;align-items:center;flex-wrap:wrap;gap:3px;margin-top:3px;">
              <span>Chamado #${escapeHtml(String(c.numero))}</span>
              <span style="color:#334155">&bull;</span>
              <span>${localIcon} <span class="chamado-local-link" onclick="highlightLocalOnMap('${escapeHtml(c.local).replace(/'/g,"\\'")}','${regiao}')" title="Ver no mapa">${escapeHtml(c.local)}</span></span>
              <span class="chamado-regiao-badge"
                style="background:${regCor}18;color:${regCor};border-color:${regCor}44;"
                onclick="selectRegion('${regiao}')" title="Ver região ${regiao} no mapa">
                🗺️ ${regiao}
              </span>
            </div>
            <div class="chamado-date" style="margin-top:2px;">Modificado em: ${formatDate(c.modifiedAt)}</div>
          </div>
          <span class="urgency-badge urgency-${c.urgency || 'media'}">${urgencyLabels[c.urgency] || 'Média'}</span>
          <span class="chamado-status ${c.status}">${statusLabel}</span>
          <div class="chamado-actions">
            <button class="btn btn-edit" onclick="openInlineEdit('${c.id}')">✏️ Editar</button>
            <button class="btn btn-toggle ${isConcluido ? 'done' : ''}" onclick="toggleChamado('${c.id}')">${toggleLabel}</button>
            <button class="btn btn-danger" onclick="deleteChamado('${c.id}')">🗑</button>
          </div>
        </div>
        <div class="inline-edit-panel" id="edit-panel-${c.id}" style="display:none;"></div>`;
    }

    async function renderChamados() {
      const chamados = await loadChamados();
      const list = document.getElementById('chamadoList');
      const query = document.getElementById('searchInput')?.value.toLowerCase() || '';
      const urgencyLabels = { 'muito-alta':'Muito Alta','alta':'Alta','media':'Média','baixa':'Baixa','muito-baixa':'Muito Baixa' };

      const filtered = chamados.filter(c => {
        if (currentFilter !== 'todos' && c.status !== currentFilter) return false;
        if (query) {
          return `${c.numero} ${c.local} ${c.problem} ${urgencyLabels[c.urgency]||''}`.toLowerCase().includes(query);
        }
        return true;
      });

      updateCounts(chamados);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="list-empty">Nenhum chamado encontrado.</div>';
        return;
      }

      list.innerHTML = filtered.map(c => renderChamadoItem(c, urgencyLabels)).join('');
      renderCalendar();
    }

    initWeather();
    initCalendarSelects();
    renderChamados();

      else setTimeout(initLeafletMap, 500);
