<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Chamados</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0b1120;
      color: #e2e8f0;
      min-height: 100vh;
    }

    h1 { text-align: center; font-size: clamp(1.5rem, 3.5vw, 2.8rem); margin-bottom: 1.5rem; padding: 0 1rem; color: #38bdf8; }

    .main-container { max-width: 1100px; margin: 0 auto; padding: 0 1rem; display: flex; gap: 1.5rem; align-items: flex-start; }
    .left-panel { flex: 1; min-width: 0; }
    .right-panel { width: 340px; flex-shrink: 0; }

    /* Top bar */
    .topbar {
      background: #1e293b;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .datetime .time { font-size: 1.75rem; font-weight: 700; color: #38bdf8; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
    .datetime .date { font-size: 0.85rem; color: #64748b; margin-top: 2px; }

    .weather { display: flex; align-items: center; gap: 0.6rem; }
    .weather-icon { font-size: 2rem; }
    .weather .temp { font-size: 1.2rem; font-weight: 700; color: #e2e8f0; }
    .weather .desc { font-size: 0.75rem; color: #64748b; }
    .weather .location { display: none; }

    /* Calendar */
    .calendar-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1rem;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .calendar-header .month-year { font-size: 0.95rem; font-weight: 600; }

    .cal-nav { display: flex; gap: 0.2rem; }
    .cal-nav button {
      background: transparent;
      border: none;
      color: #64748b;
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .cal-nav button:hover { color: #38bdf8; background: rgba(56, 189, 248, 0.1); }

    .calendar-selects {
      display: flex; gap: 0.4rem; margin-bottom: 0.6rem; justify-content: center; align-items: center;
    }
    .calendar-selects select {
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      padding: 0.3rem 0.5rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
    }
    .calendar-selects select:focus { border-color: #38bdf8; outline: none; }
    .calendar-selects .go-today {
      background: transparent; border: 1px solid #334155; color: #38bdf8;
      padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
    }
    .calendar-selects .go-today:hover { background: #38bdf8; color: #0f172a; }

    .calendar-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
      font-size: 0.65rem; color: #38bdf8; font-weight: 600; margin-bottom: 0.3rem;
    }

    .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }

    /* Region Map */
    .region-map-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.25rem;
    }
    .legend-regions {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      font-size: 0.75rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #94a3b8;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    #maracajuMap {
      width: 100%;
      height: 280px;
      border-radius: 8px;
      background: #0f172a;
    }
    #maracajuMap polygon {
      transition: transform 0.15s, filter 0.2s;
    }
    #maracajuMap text {
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    #region-detected {
      min-height: 1.2rem;
      font-weight: 500;
      text-align: center;
      margin-top: 0.5rem;
    }

    .calendar-days .day {
      position: relative; padding: 0.3rem 0; font-size: 0.8rem;
      border-radius: 6px; cursor: pointer; color: #94a3b8; transition: all 0.15s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .calendar-days .day:hover { background: #334155; }
    .calendar-days .day.selected { background: #8b5cf6; color: #0f172a; font-weight: 600; }
    .calendar-days .day.today { background: #38bdf8; color: #0f172a; font-weight: 700; }
    .calendar-days .day.today.selected { background: linear-gradient(135deg, #38bdf8, #8b5cf6); color: #0f172a; font-weight: 700; }
    .calendar-days .day.other-month { color: #1e293b; cursor: default; }
    .calendar-days .day.other-month:hover { background: transparent; }
    .calendar-days .day.has-chamado { border: 1px solid #8b5cf6; }
    .calendar-days .day.holiday .day-dot {
      position: absolute; top: 2px; right: 3px; width: 5px; height: 5px;
      border-radius: 50%; background: #f59e0b;
    }
    .calendar-days .day.weekend { color: #818cf8; }
    .calendar-days .day.has-chamados-count .chamado-count {
      display: inline-block;
      font-size: 0.5rem;
      margin-top: 1px;
      color: #38bdf8;
      font-weight: bold;
    }

    .holiday-panel {
      margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #334155; min-height: 28px;
    }
    .holiday-panel .holiday-title { font-size: 0.8rem; font-weight: 600; color: #f59e0b; margin-bottom: 0.3rem; }
    .holiday-panel .holiday-list {
      list-style: none; display: flex; flex-direction: column; gap: 0.25rem;
    }
    .holiday-panel .holiday-list li {
      font-size: 0.7rem; color: #94a3b8; padding: 0.2rem 0.5rem;
      background: #0f172a; border-radius: 4px; display: flex; align-items: center; gap: 0.35rem;
    }

    .form-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .form-card form { display: flex; flex-direction: column; gap: 0.75rem; }
    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .form-group { flex: 0 1 220px; min-width: 120px; display: flex; flex-direction: column; gap: 0.25rem; }
    .form-group.wide { flex: 1; }
    .form-group label { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-card input[type="text"], .form-card input[type="number"], .form-card textarea,
    .modal input[type="text"], .modal input[type="number"], .modal textarea {
      width: 100%; padding: 0.55rem 0.75rem;
      border-radius: 8px; border: 1px solid #334155; background: #0f172a;
      color: #e2e8f0; font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s;
    }
    .form-card input[type="number"] { -moz-appearance: textfield; }
    .form-card input[type="number"]::-webkit-inner-spin-button,
    .form-card input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .form-card textarea { resize: vertical; min-height: 44px; }
    .form-card input:focus, .form-card textarea:focus, .modal input:focus, .modal textarea:focus { outline: none; border-color: #38bdf8; }
    .form-card .form-actions { display: flex; justify-content: flex-end; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 1000; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); animation: fadeIn 0.15s;
    }
    .modal-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal {
      background: #1e293b; border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 420px;
      animation: slideUp 0.2s ease-out; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h3 { font-size: 1.1rem; margin-bottom: 1rem; color: #38bdf8; }
    .modal form { display: flex; flex-direction: column; gap: 0.75rem; }
    .modal .form-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
    .modal textarea { min-height: 60px; }
    .btn-cancel { background: transparent; color: #64748b; border: 1px solid #334155; }
    .btn-cancel:hover { background: #334155; color: #e2e8f0; }

    .btn {
      padding: 0.55rem 1.2rem; border: none; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-danger { background: transparent; color: #ef4444; padding: 0.3rem 0.6rem; font-size: 0.75rem; border: 1px solid #ef444440; }
    .btn-danger:hover { background: #ef4444; color: white; }
    .btn-toggle { background: transparent; color: #94a3b8; padding: 0.3rem 0.6rem; font-size: 0.75rem; border: 1px solid #334155; }
    .btn-toggle:hover { background: #22c55e; color: #0f172a; border-color: #22c55e; }
    .btn-toggle.done { background: #22c55e20; color: #22c55e; border-color: #22c55e40; }
    .btn-toggle.done:hover { background: #22c55e; color: #0f172a; }
    .btn-edit { background: transparent; color: #8b5cf6; padding: 0.3rem 0.6rem; font-size: 0.75rem; border: 1px solid #8b5cf640; }
    .btn-edit:hover { background: #8b5cf6; color: white; }
    .btn-export-word { background: #2b579a; color: white; padding: 0.4rem 0.9rem; font-size: 0.8rem; border-radius: 8px; }
    .btn-export-word:hover { background: #3a6fb5; }
    .btn-export-excel { background: #217346; color: white; padding: 0.4rem 0.9rem; font-size: 0.8rem; border-radius: 8px; }
    .btn-export-excel:hover { background: #2a9459; }

    /* Export */
    .export-bar { display: flex; gap: 0.4rem; margin-bottom: 1rem; justify-content: flex-end; }

    /* Filters */
    .filters { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; align-items: center; flex-wrap: wrap; }
    .filter-btn {
      padding: 0.35rem 0.8rem; border-radius: 20px; border: 1px solid #334155;
      background: transparent; color: #64748b; font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
    .filter-btn:hover:not(.active) { border-color: #38bdf8; color: #38bdf8; }

    .search-container {
      flex: 1;
      min-width: 200px;
      max-width: 350px;
      position: relative;
    }

    .search-box {
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      padding: 0.35rem 0.6rem; border-radius: 20px; font-size: 0.8rem;
      font-family: inherit; outline: none; transition: border-color 0.15s;
      width: 100%;
    }
    .search-box:focus { border-color: #38bdf8; }
    .search-box::placeholder { color: #475569; }

    /* Search suggestions dropdown */
    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      margin-top: 4px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    .search-suggestions.show { display: block; }

    .suggestion-item {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid #334155;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: #263348; }
    .suggestion-item.selected { background: #334155; }

    .suggestion-number {
      font-size: 0.75rem;
      font-weight: 700;
      color: #38bdf8;
    }
    .suggestion-local {
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .suggestion-problem {
      font-size: 0.8rem;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .suggestion-urgency {
      font-size: 0.6rem;
      padding: 0.1rem 0.35rem;
      border-radius: 10px;
      width: fit-content;
    }
    .suggestion-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.2rem;
    }

    /* List */
    .list-empty { text-align: center; padding: 3rem 1rem; color: #475569; }

    .chamado-item {
      background: #1e293b;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.15s;
    }
    .chamado-item:hover { background: #263348; }
    .chamado-item.concluido { border-left: 3px solid #22c55e; }
    .chamado-item.a-fazer { border-left: 3px solid #f59e0b; }
    .chamado-info { flex: 1; min-width: 0; }
    .chamado-title { font-size: 0.9rem; margin-bottom: 0.15rem; word-break: break-word; color: #e2e8f0; }
    .chamado-title.concluido { text-decoration: line-through; color: #64748b; }
    .chamado-date { font-size: 0.7rem; color: #94a3b8; }
    .chamado-status {
      font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 10px;
      font-weight: 600; white-space: nowrap;
    }
    .chamado-status.concluido { background: #16653440; color: #4ade80; }
    .chamado-status.a-fazer { background: #713f1240; color: #fbbf24; }

    .urgency-badge {
      font-size: 0.6rem; padding: 0.1rem 0.45rem; border-radius: 10px;
      font-weight: 700; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .urgency-muito-alta { background: #ef444430; color: #ef4444; border: 1px solid #ef444460; }
    .urgency-alta { background: #f9731630; color: #f97316; border: 1px solid #f9731660; }
    .urgency-media { background: #ffffffcc; color: #000000; border: 1px solid #00000040; }
    .urgency-baixa { background: #3b82f630; color: #3b82f6; border: 1px solid #3b82f660; }
    .urgency-muito-baixa { background: #22c55e30; color: #22c55e; border: 1px solid #22c55e60; }

    .urgency-select {
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      padding: 0.4rem 0.6rem; border-radius: 8px; font-size: 0.85rem;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
      width: 100%;
    }
    .urgency-select:focus { border-color: #38bdf8; outline: none; background: #1e293b; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }

    .calendar-chamado-item {
      font-size: 0.7rem; color: #94a3b8; padding: 0.25rem 0.5rem;
      background: #0f172a; border-radius: 4px; display: flex;
      align-items: center; gap: 0.4rem; margin-bottom: 0.3rem;
    }
    .calendar-chamado-status { font-size: 0.6rem; color: #64748b; }

    .chamado-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }

    .count-bar { display: flex; gap: 1rem; font-size: 0.8rem; color: #475569; margin-bottom: 0.75rem; }
    .count-bar span strong { color: #94a3b8; }

    /* Pulse animation for highlighted items */
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
      100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
    }
    .chamado-item.highlight {
      animation: pulse 0.8s ease-out;
      border-left-color: #38bdf8 !important;
    }

    @media (max-width: 768px) {
      .main-container { flex-direction: column; }
      .right-panel { width: 100%; }
    }

    @media (max-width: 768px) {
      .main-container { flex-direction: column; }
      .right-panel { width: 100%; }
      .topbar { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal" onclick="closeEditModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Editar Chamado</h3>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group">
            <label for="editNumero">N&#250;mero do Chamado</label>
            <input type="number" id="editNumero" required>
          </div>
          <div class="form-group">
            <label for="editLocal">Local</label>
            <input type="text" id="editLocal" required>
          </div>
          <div class="form-group">
            <label for="editUrgencia">Urg&ecirc;ncia</label>
            <select id="editUrgencia" class="urgency-select" required>
              <option value="muito-alta">&#128308; Muito Alta</option>
              <option value="alta">&#128999; Alta</option>
              <option value="media">&#128992; M&eacute;dia</option>
              <option value="baixa">&#128309; Baixa</option>
              <option value="muito-baixa">&#128994; Muito Baixa</option>
            </select>
          </div>
        </div>
        <div class="form-group wide">
          <label for="editProblema">Problema</label>
          <textarea id="editProblema" required></textarea>
        </div>
        <div class="form-group">
          <label for="editStatus">Status</label>
          <select id="editStatus" class="urgency-select" required>
            <option value="a-fazer">A Fazer</option>
            <option value="pendente">Pendente</option>
            <option value="concluido">Concluído</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" onclick="closeEditModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <h1>Gerenciador de Chamados</h1>
  <div class="main-container">
    <div class="left-panel">
      <!-- Regional Map Section -->
      <div class="region-map-card">
        <h3 style="margin-bottom: 0.75rem; color: #38bdf8; font-size: 1rem; display:flex; justify-content:space-between; align-items:center;">
          Regiões de Maracaju - MS
          <span style="font-size:0.7rem; color:#64748b; font-weight:normal">Passe o mouse no mapa</span>
        </h3>
        <div class="legend-regions">
          <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Norte</div>
          <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Sul</div>
          <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> Leste</div>
          <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> Oeste</div>
          <div class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span> Centro</div>
        </div>
        <div id="maracajuMap" style="width: 100%; min-height: 260px; height: 260px; border-radius: 8px; position: relative;"></div>
        <p id="region-detected" style="margin-top: 0.5rem; font-size: 0.85rem; color: #64748b; text-align: center; min-height: 1.2em;"></p>
      </div>

      <!-- Top bar: clock + weather -->
      <div class="topbar">
        <div class="datetime">
          <div class="time" id="clock">--:--:--</div>
          <div class="date" id="dateDisplay"></div>
        </div>
        <div class="weather" id="weatherWidget">
          <div class="weather-icon" id="weatherIcon"></div>
          <div>
            <div class="temp" id="weatherTemp">-- &deg;C</div>
            <div class="desc" id="weatherDesc">Carregando clima...</div>
            <div class="location" id="weatherLocation"></div>
          </div>
        </div>
      </div>

      <div class="form-card">
        <form id="chamadoForm">
          <div class="form-row">
            <div class="form-group">
              <label for="chamadoNumero">N&#250;mero do Chamado</label>
              <input type="number" id="chamadoNumero" placeholder="Ex: 1234" required autocomplete="off">
            </div>
            <div class="form-group">
              <label for="chamadoLocal">Local</label>
              <input type="text" id="chamadoLocal" placeholder="Ex: Sala 302 - T&eacute;rreo" required>
            </div>
            <div class="form-group">
              <label for="chamadoUrgencia">Urg&ecirc;ncia</label>
              <select id="chamadoUrgencia" class="urgency-select" required>
                <option value="">Selecione...</option>
                <option value="muito-alta">&#128308; Muito Alta</option>
                <option value="alta">&#128999; Alta</option>
                <option value="media" selected>&#128992; M&eacute;dia</option>
                <option value="baixa">&#128309; Baixa</option>
                <option value="muito-baixa">&#128994; Muito Baixa</option>
              </select>
            </div>
          </div>
          <div class="form-group wide">
            <label for="chamadoProblema">Problema</label>
            <textarea id="chamadoProblema" placeholder="Descreva o problema..." required></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Adicionar</button>
          </div>
        </form>
      </div>

      <div class="count-bar">
        <span>Total: <strong id="totalCount">0</strong></span>
        <span>A fazer: <strong id="todoCount">0</strong></span>
        <span>Pendente: <strong id="pendingCount">0</strong></span>
        <span>Conclu&iacute;dos: <strong id="doneCount">0</strong></span>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="a-fazer">A Fazer</button>
        <button class="filter-btn" data-filter="pendente">Pendente</button>
        <button class="filter-btn" data-filter="concluido">Conclu&iacute;dos</button>
      </div>

      <div class="filters">
        <div class="search-container">
          <input type="text" class="search-box" id="searchInput" placeholder="Número, local ou problema..." autocomplete="off" style="width: 220px; max-width: 220px;">
          <button type="button" class="btn btn-primary" id="searchBtn" style="margin-left: 0.4rem; padding: 0.35rem 0.7rem; font-size: 0.75rem;">BUSCAR</button>
          <div class="search-suggestions" id="searchSuggestions"></div>
        </div>

      <div class="export-bar">
        <button class="btn btn-export-word" onclick="exportWordPendente()" style="margin-left: 0.4rem;" id="exportWordAll">Exportar Word</button>
        <button class="btn btn-export-excel" onclick="exportExcelPendente()" style="margin-left: 0.4rem;" id="exportExcelAll">Exportar Excel</button>

            <button onclick="calPrevMonth()" title="M\u00eas anterior">&#8249;</button>
            <button onclick="calPrevYear()" title="Ano anterior">&#171;</button>
          </div>
          <div class="month-year" id="calMonthYear"></div>
          <div class="cal-nav">
            <button onclick="calNextMonth()" title="Pr\u00f3ximo m\u00eas">&#8250;</button>
            <button onclick="calNextYear()" title="Pr\u00f3ximo ano">&#187;</button>
          </div>

        <div class="calendar-selects">
          <select id="calMonthSelect" onchange="calGoMonth(this.value)"></select>
          <select id="calYearSelect" onchange="calGoYear(this.value)"></select>

          <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>S&aacute;b</div>
        </div>
        <div class="calendar-days" id="calDays"></div>

          <div class="holiday-title" id="holidayTitle">Selecione uma data</div>

  <script>
    // ============ CHAMADOS ============
    const STORAGE_KEY = 'chamados';
    let currentFilter = 'todos';

    function loadChamados() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveChamados(chamados) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(chamados));
    }

    function formatDate(d) {
      const date = new Date(d);
      return date.toLocaleString('pt-BR');
    }

    function getChamadoDatesByDay() {
      const chamados = loadChamados();
      const set = {};
      chamados.forEach(c => {
        const d = new Date(c.modifiedAt);
        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        set[key] = true;
      });
      return set;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toggleChamado(id) {
      const chamados = loadChamados();
      const item = chamados.find(c => c.id === id);
      if (!item) return;
      // Cycle through statuses: a-fazer -> pendente -> concluido -> a-fazer
      if (item.status === 'a-fazer') {
        item.status = 'pendente';
      } else if (item.status === 'pendente') {
        item.status = 'concluido';
      } else {
        item.status = 'a-fazer';
      }
      item.modifiedAt = new Date().toISOString();
      saveChamados(chamados);
      renderChamados();
    }

    function editChamado(id) {
      const chamados = loadChamados();
      const item = chamados.find(c => c.id === id);
      if (!item) return;

      document.getElementById('editId').value = id;
      document.getElementById('editNumero').value = item.numero;
      document.getElementById('editLocal').value = item.local;
      document.getElementById('editProblema').value = item.problem;
      document.getElementById('editUrgencia').value = item.urgency || 'media';
      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
    }

    document.getElementById('editForm').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const numero = document.getElementById('editNumero').value.trim();
      const local = document.getElementById('editLocal').value.trim();
      const problema = document.getElementById('editProblema').value.trim();
      const urgencia = document.getElementById('editUrgencia').value;
      const status = document.getElementById('editStatus').value;
      if (!numero || !local || !problema) return;

      const chamados = loadChamados();
      const item = chamados.find(c => c.id === id);
      if (!item) return;
      item.numero = numero;
      item.local = local;
      item.problem = problema;
      item.urgency = urgencia;
      item.status = status;
      item.modifiedAt = new Date().toISOString();
      saveChamados(chamados);
      closeEditModal();
      renderChamados();
    });

    function deleteChamado(id) {
      const chamados = loadChamados().filter(c => c.id !== id);
      saveChamados(chamados);
      renderChamados();
    }

    document.getElementById('chamadoForm').addEventListener('submit', e => {
      e.preventDefault();
      const numero = document.getElementById('chamadoNumero').value.trim();
      const local = document.getElementById('chamadoLocal').value.trim();
      const problema = document.getElementById('chamadoProblema').value.trim();
      const urgencia = document.getElementById('chamadoUrgencia').value;
      if (!numero || !local || !problema) return;

      // Detectar região automaticamente
      const regiao = detectRegionFromLocal(local);

      const chamados = loadChamados();
      chamados.unshift({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
        numero, local, problem: problema, status: 'a-fazer', urgency: urgencia,
        regiao: regiao,
        modifiedAt: new Date().toISOString()
      });
      saveChamados(chamados);

      const regionDetected = document.getElementById('region-detected');
      if (regionDetected) {
        regionDetected.textContent = `✓ Chamado adicionado na região ${regiao}`;
        regionDetected.style.color = REGION_COLORS[regiao];
      }

      document.getElementById('chamadoNumero').value = '';
      document.getElementById('chamadoLocal').value = '';
      document.getElementById('chamadoProblema').value = '';
      document.getElementById('chamadoUrgencia').value = 'media';
      renderChamados();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderChamados();
      });
    });

    // ============ SEARCH WITH SUGGESTIONS ============
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchSuggestions = document.getElementById('searchSuggestions');
    let suggestionsTimeout;

    // Show suggestions as user types (number, local, or problem)
    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      clearTimeout(suggestionsTimeout);

      if (!query || query.length < 1) {
        hideSuggestions();
        // Limpar a busca e mostrar todos os chamados novamente
        renderChamados();
        return;
      }

      // Debounce suggestions
      suggestionsTimeout = setTimeout(() => {
        const chamados = loadChamados();
        const urgencyLabels = { 'muito-alta': 'Muito Alta', 'alta': 'Alta', 'media': 'M\u00e9dia', 'baixa': 'Baixa', 'muito-baixa': 'Muito Baixa' };

        // Buscar chamados que têm o número como parte, ou local, ou problema similar
        const matches = chamados.filter(c => {
          return (
            String(c.numero).includes(query) ||
            c.local.toLowerCase().includes(query) ||
            c.problem.toLowerCase().includes(query)
          );
        }).slice(0, 8); // Limitar a 8 sugestões

        if (matches.length > 0) {
          showSuggestions(matches, urgencyLabels);
        } else {
          hideSuggestions();
        }
      }, 200);
    });

    function showSuggestions(chamados, urgencyLabels) {
      const html = chamados.map(c => `
        <div class="suggestion-item" data-id="${c.id}" onclick="selectSuggestion(${c.id})">
          <span class="suggestion-number">#${escapeHtml(c.numero)}</span>
          <span class="suggestion-local">${escapeHtml(c.local)}</span>
          <span class="suggestion-problem">${escapeHtml(c.problem)}</span>
          <div class="suggestion-meta">
            <span class="urgency-badge urgency-${c.urgency || 'media'}">${urgencyLabels[c.urgency] || 'M\u00e9dia'}</span>
            <span class="chamado-status ${c.status}">${c.status === 'concluido' ? 'Conclu\u00eddo' : 'A Fazer'}</span>
          </div>
        </div>
      `).join('');

      searchSuggestions.innerHTML = html;
      searchSuggestions.classList.add('show');
    }

    function hideSuggestions() {
      searchSuggestions.classList.remove('show');
      searchSuggestions.innerHTML = '';
    }

    // Select a suggestion - preenche a caixa e executa a busca automaticamente
    window.selectSuggestion = function(id) {
      const chamados = loadChamados();
      const item = chamados.find(c => c.id === id);
      if (item) {
        searchInput.value = item.numero;  // Preenche o número do chamado na caixa
        hideSuggestions();
        performSearch(item.numero.toString());  // Executa a busca automaticamente
        // Destacar o chamado encontrado na lista
        setTimeout(() => {
          const el = document.getElementById(`chamado-${id}`);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.style.animation = 'pulse 0.5s ease-out';
          }
        }, 150);
      }
    };

    // Botão BUSCAR - buscar pelo número digitado
    searchBtn.addEventListener('click', () => {
      const query = searchInput.value.trim();
      if (query) {
        hideSuggestions();
        performSearch(query);
      }
    });

    // Também buscar ao pressionar Enter
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = searchInput.value.trim();
        if (query) {
          hideSuggestions();
          performSearch(query);
        }
      }
      // Navegar sugestões com setas
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        navigateSuggestions(e.key === 'ArrowDown' ? 1 : -1);
        e.preventDefault();
      }
      // Selecionar com Enter nas sugestões
      if (e.key === 'Enter') {
        const selected = searchSuggestions.querySelector('.selected');
        if (selected) {
          selectSuggestion(selected.dataset.id);
          e.preventDefault();
        }
      }
      // Fechar com Escape
      if (e.key === 'Escape') {
        hideSuggestions();
      }
    });

    function navigateSuggestions(direction) {
      const items = searchSuggestions.querySelectorAll('.suggestion-item');
      if (items.length === 0) return;

      const current = searchSuggestions.querySelector('.selected');
      let targetIndex = 0;

      if (current) {
        current.classList.remove('selected');
        targetIndex = Array.from(items).indexOf(current) + direction;
        if (targetIndex < 0) targetIndex = items.length - 1;
        if (targetIndex >= items.length) targetIndex = 0;
      }

      items[targetIndex].classList.add('selected');
      items[targetIndex].scrollIntoView({ block: 'nearest' });
    }

    function performSearch(query) {
      const chamados = loadChamados();
      const list = document.getElementById('chamadoList');
      const urgencyLabels = { 'muito-alta': 'Muito Alta', 'alta': 'Alta', 'media': 'M\u00e9dia', 'baixa': 'Baixa', 'muito-baixa': 'Muito Baixa' };

      // Busca filtrada por número, local ou problema
      const filtered = chamados.filter(c => {
        // Aplicar filtro de status atual
        if (currentFilter !== 'todos' && c.status !== currentFilter) return false;
        // Buscar por número, local ou problema
        return (
          String(c.numero).includes(query) ||
          c.local.toLowerCase().includes(query) ||
          c.problem.toLowerCase().includes(query)
        );
      });

      document.getElementById('totalCount').textContent = chamados.length;
      document.getElementById('todoCount').textContent = chamados.filter(c => c.status === 'a-fazer').length;
      document.getElementById('doneCount').textContent = chamados.filter(c => c.status === 'concluido').length;

      // Scroll ao topo da lista
      list.scrollIntoView({ behavior: 'smooth', block: 'start' });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="list-empty">Nenhum chamado encontrado para essa busca.</div>';
        return;
      }

      // Renderizar resultados buscados
      list.innerHTML = filtered.map(c => `
        <div class="chamado-item ${c.status}" id="chamado-${c.id}">
          <div class="chamado-info">
            <div class="chamado-title ${c.status}">${escapeHtml(c.problem)}</div>
            <div class="chamado-date">
              Chamado #${escapeHtml(c.numero)} &bull; Local: ${escapeHtml(c.local)}
              &bull; <strong style="color:${REGION_COLORS[c.regiao]||'#94a3b8'}">${c.regiao || 'N/A'}</strong>
            </div>
            <div class="chamado-date">Modificado em: ${formatDate(c.modifiedAt)}</div>
          </div>
          <span class="urgency-badge urgency-${c.urgency || 'media'}">${urgencyLabels[c.urgency] || 'M\u00e9dia'}</span>
          <span class="chamado-status ${c.status}">${c.status === 'concluido' ? 'Conclu\u00eddo' : 'A Fazer'}</span>
          <div class="chamado-actions">
            <button class="btn btn-edit" onclick="editChamado('${c.id}')">Editar</button>
            <button class="btn btn-toggle ${c.status === 'concluido' ? 'done' : ''}" onclick="toggleChamado('${c.id}')">
              ${c.status === 'concluido' ? 'Reabrir' : 'Concluir'}
            </button>
            <button class="btn btn-danger" onclick="deleteChamado('${c.id}')">Excluir</button>
          </div>
        </div>
      `).join('');
    }

    // Fechar sugestões ao clicar fora
    document.addEventListener('click', (e) => {
      if (!searchInput.contains(e.target) && !searchSuggestions.contains(e.target)) {
        hideSuggestions();
      }
    });

    // ============ WEATHER (Open-Meteo) ============
    const WMO_CODES = {
      0: ['Céu limpo', '☀️'], 1: ['Predominantemente limpo', '🌤️'], 2: ['Parcialmente nublado', '⛅'],
      3: ['Nublado', '☁️'], 45: ['Neblina', '🌫️'], 48: ['Neblina com geada', '🌫️'],
      51: ['Garoa leve', '🌦️'], 53: ['Garoa moderada', '🌦️'], 55: ['Garoa intensa', '🌧️'],
      56: ['Garoa gelada leve', '🧊'], 57: ['Garoa gelada intensa', '🧊'],
      61: ['Chuva leve', '🌧️'], 63: ['Chuva moderada', '🌧️'], 65: ['Chuva forte', '⛈️'],
      66: ['Chuva gelada leve', '🧊'], 67: ['Chuva gelada forte', '🧊'],
      71: ['Neve leve', '❄️'], 73: ['Neve moderada', '❄️'], 75: ['Neve intensa', '❄️'],
      77: ['Grãos de neve', '❄️'], 80: ['Pancadas leves', '🌦️'],
      81: ['Pancadas moderadas', '🌧️'], 82: ['Pancadas fortes', '⛈️'],
      85: ['Neve leve', '🌨️'], 86: ['Neve intensa', '🌨️'],
      95: ['Trovoada', '⛈️'], 96: ['Trovoada com granizo leve', '⛈️'], 99: ['Trovoada com granizo forte', '⛈️']
    };

    // Cache para weather (15 minutos)
    let weatherCache = null;
    let weatherCacheTime = 0;

    function fetchWeather(lat, lon) {
      const now = Date.now();
      // Se cache for válido (menos de 15 min), usar cache
      if (weatherCache && (now - weatherCacheTime < 15 * 60 * 1000)) {
        updateWeatherDisplay(weatherCache);
        return;
      }

      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`)
        .then(r => {
          if (!r.ok) throw new Error('Weather API error');
          return r.json();
        })
        .then(data => {
          if (!data.current) throw new Error('No current data');
          weatherCache = data.current;
          weatherCacheTime = Date.now();
          updateWeatherDisplay(data.current);
        })
        .catch(err => {
          console.warn('Weather fetch failed:', err);
          // Fallback: clima local simulado se falhar API
          document.getElementById('weatherIcon').textContent = '🌤️';
          document.getElementById('weatherTemp').textContent = '--°C';
          document.getElementById('weatherDesc').textContent = 'Clima indisponível';
          document.getElementById('weatherLocation').textContent = 'Maracaju-MS';
        });
    }

    function updateWeatherDisplay(w) {
      const [desc, icon] = WMO_CODES[w.weather_code] || ['Desconhecido', '❓'];
      document.getElementById('weatherIcon').textContent = icon;
      document.getElementById('weatherTemp').textContent = `${Math.round(w.temperature_2m)}°C`;
      document.getElementById('weatherDesc').textContent = desc;
      document.getElementById('weatherLocation').textContent = `Umidade ${w.relative_humidity_2m}% • Vento ${Math.round(w.wind_speed_10m)} km/h`;
    }

    function initWeather() {
      // Coordenadas de Maracaju-MS (aproximadas)
      const MARACAJU_LAT = -20.4511;
      const MARACAJU_LON = -54.9297;

      fetchWeather(MARACAJU_LAT, MARACAJU_LON);

      // Atualizar a cada 15 minutos
      setInterval(() => {
        fetchWeather(MARACAJU_LAT, MARACAJU_LON);
      }, 15 * 60 * 1000);
    }

    // ============ CLOCK ============
    const DIAS = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
    const MESES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

    function updateClock() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
      document.getElementById('dateDisplay').textContent =
        `${DIAS[now.getDay()]}, ${now.getDate()} de ${MESES[now.getMonth()]} de ${now.getFullYear()}`;
    }

    // ============ CALENDAR ============
    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();
    let selectedDay = new Date().getDate();

    const MONTH_NAMES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                         'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

    // Fixed holidays [month (0-idx), day, name]
    const FIXED_HOLIDAYS = [
      // Janeiro
      [0, 1, 'Confraternização Universal'],
      [0, 6, 'Dia de Reis'],
      // Fevereiro
      [1, 2, 'Dia da Candelária'],
      // Março
      [2, 8, 'Dia Internacional da Mulher'],
      [2, 15, 'Tiradentes'],
      [2, 25, 'Dia da Revolta da Vacina'],
      // Abril
      [3, 21, 'Tiradentes - Dia da Revolta da Vacina'],
      // Maio
      [4, 1, 'Dia do Trabalho'],
      // Junho
      [5, 12, 'Dia dos Namorados'],
      [5, 13, 'Dia de Santo Antônio'],
      [5, 24, 'São João'],
      // Julho
      [6, 9, 'Revolução Constitucionalista de 1932'],
      // Agosto
      [7, 7, 'Independência do Brasil'],
      [7, 15, 'Dia do Indígena'],
      [7, 20, 'Dia do Soldado'],
      // Setembro
      [8, 7, 'Independência do Brasil'],
      [8, 12, 'Dia das Crianças'],
      [8, 15, 'Dia de Nossa Senhora da Conceição'],
      [8, 19, 'Dia do Soldado'],
      // Outubro
      [9, 2, 'Finados'],
      [9, 12, 'Dia de Nossa Senhora Aparecida'],
      [9, 15, 'Proclamação da República'],
      [9, 28, 'Dia do Servidor Público'],
      [9, 31, 'Dia das Bruxas (Halloween)'],
      // Novembro
      [10, 2, 'Finados'],
      [10, 15, 'Proclamação da República'],
      [10, 20, 'Dia da Consciência Negra'],
      [10, 29, 'Dia da Reforma Ortográfica'],
      // Dezembro
      [11, 8, 'Dia da Imaculada Conceição'],
      [11, 25, 'Natal'],
      [11, 31, 'Véspera de Ano Novo']
    ];

    // Find the Nth day-of-week of a month (0=Sun)
    function nthDayOfMonth(month, dayOfWeek, occurrence, year) {
      const d = new Date(year, month, 1);
      let count = 0;
      while (d.getMonth() === month) {
        if (d.getDay() === dayOfWeek) { count++; if (count === occurrence) return d; }
        d.setDate(d.getDate() + 1);
      }
      return d;
    }

    // Calculate Easter (computus)
    function getEaster(year) {
      const a = year % 19;
      const b = Math.floor(year / 100);
      const c = year % 100;
      const d = Math.floor(b / 4);
      const e = b % 4;
      const f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3);
      const h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4);
      const k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, month, day);
    }

    // Generate movable holidays for a given year
    function getMovableHolidays(year) {
      const easter = getEaster(year);
      const movable = [];
      const addFromEaster = (days, name) => {
        const d = new Date(easter); d.setDate(d.getDate() + days);
        movable.push([d.getMonth(), d.getDate(), name]);
      };
      const addNthWeekday = (month, dow, n, name) => {
        const d = nthDayOfMonth(month, dow, n, year);
        movable.push([d.getMonth(), d.getDate(), name]);
      };

      // Easter-related
      addFromEaster(-47, 'Carnaval');
      addFromEaster(-46, 'Carnaval (Terça)');
      addFromEaster(-45, 'Quarta-feira de Cinzas');
      addFromEaster(-2, 'Sexta-feira Santa');
      addFromEaster(0, 'Páscoa');
      addFromEaster(60, 'Corpus Christi');

      // Mother's Day - 2nd Sunday of May
      addNthWeekday(4, 0, 2, 'Dia das Mães');
      // Father's Day - 2nd Sunday of August
      addNthWeekday(7, 0, 2, 'Dia dos Pais');

      // Tiradantes - 21 de abril
      movable.push([3, 21, 'Tiradentes']);

      // Dia das Mães - 2º domingo de maio
      addNthWeekday(4, 0, 2, 'Dia das Mães');

      // Dia dos Pais - 2º domingo de agosto
      addNthWeekday(7, 0, 2, 'Dia dos Pais');

      // Dia da Criança - 12 de outubro
      movable.push([9, 12, 'Dia das Crianças']);

      // Dia dos Finados - 2 de novembro
      movable.push([10, 2, 'Finados']);

      // Dia de Nossa Senhora Aparecida - 12 de outubro
      movable.push([9, 12, 'Dia de Nossa Senhora Aparecida']);

      // Dia da Consciência Negra - 20 de novembro
      movable.push([10, 20, 'Dia da Consciência Negra']);

      // Dia do Servidor Público - 28 de outubro
      movable.push([9, 28, 'Dia do Servidor Público']);

      return movable;
    }

    // Get holidays for a specific date (month 0-indexed, day)
    function getHolidaysForDate(month, day) {
      const results = [];
      FIXED_HOLIDAYS.forEach(([m, d, name]) => {
        if (m === month && d === day) results.push(name);
      });
      const movable = getMovableHolidays(calYear);
      movable.forEach(([m, d, name]) => {
        if (m === month && d === day) results.push(name);
      });
      return results;
    }

    // Check if date is a holiday (fast check)
    function isHoliday(year, month, day) {
      // Fixed
      for (const [m, d] of FIXED_HOLIDAYS) {
        if (m === month && d === day) return true;
      }
      // Movable
      const movable = getMovableHolidays(year);
      for (const [m, d] of movable) {
        if (m === month && d === day) return true;
      }
      return false;
    }

    function initCalendarSelects() {
      const yearSel = document.getElementById('calYearSelect');
      const monthSel = document.getElementById('calMonthSelect');
      const currentY = new Date().getFullYear();
      yearSel.innerHTML = '';
      for (let y = currentY - 20; y <= currentY + 20; y++) {
        yearSel.innerHTML += `<option value="${y}">${y}</option>`;
      }
      yearSel.value = calYear;
      monthSel.innerHTML = MONTH_NAMES.map((m, i) => `<option value="${i}">${m}</option>`).join('');
      monthSel.value = calMonth;

    function calPrevMonth() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
    function calNextMonth() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }
    function calPrevYear() { calYear--; initCalendarSelects(); renderCalendar(); }
    function calNextYear() { calYear++; initCalendarSelects(); renderCalendar(); }
    function calGoYear(v) { calYear = parseInt(v); renderCalendar(); }
    function calGoMonth(v) { calMonth = parseInt(v); renderCalendar(); }
    function calGoToday() {
      const today = new Date();
      calYear = today.getFullYear();
      calMonth = today.getMonth();
      selectedDay = today.getDate();
      initCalendarSelects();
      renderCalendar();
      showHolidays(today.getMonth(), today.getDate());

    function showHolidays(month, day) {
      // Atualizar o dia selecionado
      selectedDay = day;

      const holidays = getHolidaysForDate(month, day);
      const title = document.getElementById('holidayTitle');
      const list = document.getElementById('holidayList');
      const dateStr = `${day} de ${MONTH_NAMES[month]} de ${calYear}`;
      const urgencyLabels = { 'muito-alta': 'Muito Alta', 'alta': 'Alta', 'media': 'M\u00e9dia', 'baixa': 'Baixa', 'muito-baixa': 'Muito Baixa' };

      // Buscar chamados do dia
      const dayChamados = loadChamados().filter(c => {
        const d = new Date(c.modifiedAt);
        return d.getFullYear() === calYear && d.getMonth() === month && d.getDate() === day;
      });

      const itemCount = dayChamados.length;
      title.textContent = itemCount > 0 ? `${dateStr} — ${itemCount} chamado(s)` : `${dateStr} — Sem chamados`;

      let html = '';

      if (holidays.length > 0) {

      // Chamados do dia

          html += `
            <li class="calendar-chamado-item" style="

              border-left:3px solid ${regionColor};

                ${c.status==='concluido'?'✓':'○'}

        html = '<li style="padding:0.25rem 0.5rem; color:#64748b"><span class="h-icon">○</span> Nenhum chamado registrado</li>';
      }

    function renderCalendar() {
      const daysEl = document.getElementById('calDays');
      const label = document.getElementById('calMonthYear');
      label.textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;

      document.getElementById('calYearSelect').value = calYear;
      document.getElementById('calMonthSelect').value = calMonth;

      const first = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const today = new Date();
      const chamadoDays = getChamadoDatesByDay();
      const movableHolidays = getMovableHolidays(calYear); // Usado apenas se necessário

      let html = '';
      // Previous month days
      const prevMonthDays = new Date(calYear, calMonth, 0).getDate();
      for (let i = first - 1; i >= 0; i--) {
        html += `<div class="day other-month">${prevMonthDays - i}</div>`;
      }
      // Current month
      for (let d = 1; d <= daysInMonth; d++) {
        const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
        const key = `${calYear}-${calMonth}-${d}`;
        const hasChamado = chamadoDays[key] ? 'has-chamado' : '';
        const holiday = isHoliday(calYear, calMonth, d);
        const holidayClass = holiday ? 'holiday' : '';
        const date = new Date(calYear, calMonth, d);
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        const weekendClass = isWeekend && !isToday ? 'weekend' : '';
        const isSelected = d === selectedDay ? 'selected' : '';

        // Contar chamados do dia
        const dayChamadosCount = loadChamados().filter(c => {
          const cd = new Date(c.modifiedAt);
          return cd.getFullYear() === calYear && cd.getMonth() === calMonth && cd.getDate() === d;
        }).length;

        let titleAttr = '';
        let extraClass = '';
        if (holiday) {
          const hn = getHolidaysForDate(calMonth, d);
          titleAttr = `title="${hn.join(', ')}"`;
          extraClass = ' holiday';
        }
        if (dayChamadosCount > 0) {
          extraClass += ' has-chamados-count';
        }

        let dayContent = d;
        if (holiday) dayContent += '<span class="day-dot"></span>';
        if (dayChamadosCount > 0) {
          dayContent += `<span class="chamado-count" style="
            display:inline-block;
            font-size:0.5rem;
            margin-top:1px;
            color:#38bdf8;
            font-weight:bold">●</span>`;
        }

        html += `<div class="day${isToday ? ' today' : ''}${extraClass}${isSelected ? ' selected' : ''}"
          ${titleAttr}
          onclick="showHolidays(${calMonth}, ${d})">${dayContent}</div>`;
      }
      // Next month
      const totalCells = first + daysInMonth;
      const remaining = (7 - (totalCells % 7)) % 7;
      for (let i = 1; i <= remaining; i++) {
        html += `<div class="day other-month">${i}</div>`;
      }
      daysEl.innerHTML = html;
    }

    function escapeXml(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function downloadFile(content, filename, mime) {
      const blob = new Blob(['\ufeff' + content], { type: mime + ';charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    // ============ MARACAJU REGION MAP ============
    // Mapa interativo das regioes de Maracaju-MS

    const REGION_COLORS = {
      'Norte': '#ef4444',
      'Sul': '#22c55e',
      'Leste': '#3b82f6',
      'Oeste': '#f59e0b',
      'Centro': '#8b5cf6'
    };

    // Palavras-chave para detecção automática de região (bairros de Maracaju-MS)
    const REGION_KEYWORDS = {
      'Norte': ['norte', 'jardim norte', 'vila nova', 'alto da colina', 'panambi', 'são joão', 'jardim são pedro norte'],
      'Sul': ['sul', 'jardim sul', 'são pedro', 'rocha', 'silva', 'tarumã', 'paranavaí', 'balneario', 'jardim São Pedro', 'vila São Pedro'],
      'Leste': ['leste', 'progresso', 'esperança', 'vitória', 'euro americano', 'euro-americano', 'povoado', 'jardim leste'],
      'Oeste': ['oeste', 'bonfim', 'morena', 'cidade morena', 'jardim morena', 'jardim oeste', 'panambi', 'vila oeste'],
      'Centro': ['centro', 'pardim', 'matriz', 'bela vista', 'jardim getúlio', 'presidente', 'getúlio', 'jardim presidentes']
    };

    // Polígonos SVG simplificados para representar as regiões
    const REGION_BAIRROS = {
      'Norte': ['Jardim Norte', 'Vila Nova', 'Alto da Colina', 'Panambi', 'São João', 'Jardim São Pedro Norte'],
      'Sul': ['Jardim Sul', 'Vila São Pedro', 'São Pedro', 'Rocha', 'Silva', 'Tarumã', 'Paranavaí', 'Balneário'],
      'Leste': ['Jardim Leste', 'Progresso', 'Esperança', 'Vitória', 'Euro-Americano', 'Povoado'],
      'Oeste': ['Jardim Oeste', 'Bonfim', 'Cidade Morena', 'Jardim Morena', 'Vila Oeste'],
      'Centro': ['Centro', 'Pardim', 'Matriz', 'Bela Vista', 'Jardim Getúlio', 'Presidente', 'Jardim Presidentes']
    };

    // Detectar região baseada no nome do local (bairro)
    function detectRegionFromLocal(local) {
      if (!local) return 'Centro';
      const l = local.toLowerCase().trim();
      for (const [region, bairros] of Object.entries(REGION_BAIRROS)) {
        for (const bairro of bairros) {
          if (l.includes(bairro.toLowerCase())) return region;
        }
      }
      if (l.includes('centro')) return 'Centro';
      if (l.includes('jardim')) {
        if (l.includes('norte')) return 'Norte';
        if (l.includes('sul')) return 'Sul';
        if (l.includes('leste')) return 'Leste';
        if (l.includes('oeste')) return 'Oeste';
      }
      return 'Centro';
    }

    // ============ MAPA COM LEAFLET (OpenStreetMap) ============
    let map = null;
    let regionLayers = {};

    function initLeafletMap() {
      const mapEl = document.getElementById('maracajuMap');
      if (!mapEl || map) return; // Evitar inicialização dupla

      // Centro de Maracaju-MS
      const center = [-20.4511, -54.9297];

      // Inicializar mapa
      map = L.map('maracajuMap', {
        center: center,
        zoom: 13,
        zoomControl: true,
        attributionControl: true
      });

      // Camada OpenStreetMap
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
      }).addTo(map);

      // Polígonos das regiões (coordenadas aproximadas)
      const regionBoundaries = {
        'Norte': [
          [-20.44, -54.94],
          [-20.42, -54.94],
          [-20.42, -54.88],
          [-20.44, -54.88]
        ],
        'Sul': [
          [-20.48, -54.94],
          [-20.46, -54.94],
          [-20.46, -54.88],
          [-20.48, -54.88]
        ],
        'Leste': [
          [-20.44, -54.88],
          [-20.42, -54.88],
          [-20.42, -54.86],
          [-20.44, -54.86]
        ],
        'Oeste': [
          [-20.44, -55.00],
          [-20.42, -55.00],
          [-20.42, -54.98],
          [-20.44, -54.98]
        ],
        'Centro': [
          [-20.45, -54.93],
          [-20.43, -54.93],
          [-20.43, -54.91],
          [-20.45, -54.91]
        ]
      };

      // Adicionar cada região
      Object.entries(regionBoundaries).forEach(([regionName, coords]) => {
        const polygon = L.polygon(coords, {
          color: REGION_COLORS[regionName],
          fillColor: REGION_COLORS[regionName],
          fillOpacity: 0.4,
          weight: 2,
          dashArray: regionName === 'Centro' ? '' : '5, 5'
        }).addTo(map);

        const bairros = REGION_BOAROS[regionName] || [];
        polygon.bindTooltip(`<strong>${regionName}</strong><br>${bairros.join(', ')}`, {
          sticky: true,
          direction: 'top',
          offset: [0, -10],
          className: 'region-tooltip'
        });

        polygon.on('click', () => {
          selectRegion(regionName);
        });

        regionLayers[regionName] = polygon;
      });

      // Marcador no centro
      L.marker(center).addTo(map).bindPopup('<b>Maracaju</b><br>Mato Grosso do Sul');
    }

    window.selectRegion = function(region) {
      const regionDetected = document.getElementById('region-detected');
      if (regionDetected) {
        regionDetected.textContent = `Região selecionada: ${region}`;
        regionDetected.style.color = REGION_COLORS[region];
      }
      // Destacar região no mapa
      highlightRegionOnMap(region);
    };

    window.highlightRegionOnMap = function(regionName) {
      Object.entries(regionLayers).forEach(([name, layer]) => {
        if (name === regionName) {
          layer.setStyle({ fillOpacity: 0.7, weight: 4 });
        } else {
          layer.setStyle({ fillOpacity: 0.3, weight: 1 });
        }
      });
      if (map) map.fitBounds(regionLayers[regionName].getBounds(), { padding: [20, 20] });
    };

        regiao: regiao,
        modifiedAt: new Date().toISOString()
      });

      const regionDetected = document.getElementById('region-detected');
      if (regionDetected) {
        regionDetected.textContent = `✓ Chamado adicionado na região ${regiao}`;
        regionDetected.style.color = REGION_COLORS[regiao];
      }

      document.getElementById('chamadoNumero').value = '';
      document.getElementById('chamadoLocal').value = '';
      document.getElementById('chamadoProblema').value = '';
      document.getElementById('chamadoUrgencia').value = 'media';
      renderChamados();
    });

    function renderChamados() {
      const chamados = loadChamados();
      const list = document.getElementById('chamadoList');
      const query = document.getElementById('searchInput')?.value.toLowerCase() || '';

      const urgencyLabels = { 'muito-alta': 'Muito Alta', 'alta': 'Alta', 'media': 'M\u00e9dia', 'baixa': 'Baixa', 'muito-baixa': 'Muito Baixa' };

      const filtered = chamados.filter(c => {
        if (currentFilter !== 'todos' && c.status !== currentFilter) return false;
        if (query) {
          const searchIn = `${c.numero} ${c.local} ${c.problem} ${urgencyLabels[c.urgency] || ''}`.toLowerCase();
          return searchIn.includes(query);
        }
        return true;
      });

      document.getElementById('totalCount').textContent = chamados.length;
      document.getElementById('todoCount').textContent = chamados.filter(c => c.status === 'a-fazer').length;
      document.getElementById('pendingCount').textContent = chamados.filter(c => c.status === 'pendente').length;
      document.getElementById('doneCount').textContent = chamados.filter(c => c.status === 'concluido').length;

      if (filtered.length === 0) {
        list.innerHTML = '<div class="list-empty">Nenhum chamado encontrado.</div>';
        return;
      }

      list.innerHTML = filtered.map(c => `
        <div class="chamado-item ${c.status}">
          <div class="chamado-info">
            <div class="chamado-title ${c.status}">${escapeHtml(c.problem)}</div>
            <div class="chamado-date">
              Chamado #${escapeHtml(c.numero)} &bull; Local: ${escapeHtml(c.local)}
              &bull; <strong style="color:${REGION_COLORS[c.regiao]||'#94a3b8'}">${c.regiao || 'N/A'}</strong>
            </div>
            <div class="chamado-date">Modificado em: ${formatDate(c.modifiedAt)}</div>
          </div>
          <span class="urgency-badge urgency-${c.urgency || 'media'}">${urgencyLabels[c.urgency] || 'M\u00e9dia'}</span>
          <span class="chamado-status ${c.status}">${c.status === 'concluido' ? 'Conclu\u00eddo' : 'A Fazer'}</span>
          <div class="chamado-actions">
            <button class="btn btn-edit" onclick="editChamado('${c.id}')">Editar</button>
            <button class="btn btn-toggle ${c.status === 'concluido' ? 'done' : ''}" onclick="toggleChamado('${c.id}')">
              ${c.status === 'concluido' ? 'Reabrir' : 'Concluir'}
            </button>
            <button class="btn btn-danger" onclick="deleteChamado('${c.id}')">Excluir</button>
          </div>
        </div>
      `).join('');

      renderCalendar();
    }

    // Atualizar chamado ao editar
    document.getElementById('editForm').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const numero = document.getElementById('editNumero').value.trim();
      const local = document.getElementById('editLocal').value.trim();
      const problema = document.getElementById('editProblema').value.trim();
      const urgencia = document.getElementById('editUrgencia').value;
      if (!numero || !local || !problema) return;

      const chamados = loadChamados();
      const item = chamados.find(c => c.id === id);
      if (!item) return;

      // Atualizar todos os campos
      item.numero = numero;
      item.local = local;
      item.problem = problema;
      item.urgency = urgencia;
      // Recalcular região automaticamente com base no local
      item.regiao = detectRegionFromLocal(local);
      item.modifiedAt = new Date().toISOString();

      saveChamados(chamados);
      closeEditModal();
      renderChamados();
    });

    // ============ INIT ============
    updateClock();
    setInterval(updateClock, 1000);
    initWeather();
    initCalendarSelects();
    renderChamados();

    // Inicializar mapa após carregar Leaflet
    setTimeout(() => {
      if (typeof L !== 'undefined') {
        initLeafletMap();
      } else {
        // Tentar novamente se Leaflet ainda não carregou
        setTimeout(initLeafletMap, 500);
      }
    }, 200);
  </script>

  <!-- Leaflet JS (OpenStreetMap) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</body>
</html>
